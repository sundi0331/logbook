{{- if .Values.logbook.namespace -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include "logbook.labels" . | nindent 4 }}
  name: {{ include "logbook.fullname" . }}
  namespace: {{ .Values.logbook.namespace | quote }}
rules:
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - get
  - list
  - watch
{{- end }}
