# Default values for logbook.

replicaCount: 1

logbook:
  # Namespace to watch; an empty value watches all namespaces.
  namespace: ""
  log:
    # Log format. Valid values: json, text.
    format: json
    # Log output. Valid values: stdout, stderr, file.
    out: stdout
    # Log level. Valid values: debug, info, warn, error.
    level: info
    # Full path of log file with filename. Only used when log.out is file.
    filename: k8s-events.log

image:
  repository: ghcr.io/sundi0331/logbook
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

resources:
  requests:
    cpu: 10m
    memory: 200Mi
  limits:
    cpu: 100m
    memory: 400Mi

nodeSelector: {}
tolerations: []
affinity: {}
